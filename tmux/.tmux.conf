unbind r
bind r source-file ~/.tmux.conf

set -s escape-time 10
set -g display-time 4000
set -g status-keys emacs
set -gw aggressive-resize off

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g prefix C-a
bind a send-prefix
set -g mouse on
set -g detach-on-destroy off
set -g mode-keys vi

set -g default-terminal "tmux-256color"

# Reset before appending so re-sourcing (prefix+r) stays idempotent.
set -gu terminal-features
set -gu terminal-overrides
set -as terminal-features ',xterm-ghostty*:RGB:extkeys:usstyle'

# Scrollback for Claude Code output (reduced from 50000 to mitigate tmux/tmux#4962 grid double-free crash)
# Bump back to 50000 once tmux/tmux#4962 is fully fixed and released
set -g history-limit 20000

# OSC 52 clipboard: let tmux set the system clipboard but ignore app writes.
set -g set-clipboard external

# Extended keys for Shift+Enter, Ctrl+Enter etc. in CLI tools (3.2+)
set -g extended-keys on
set -g extended-keys-format csi-u

# Neovim integration across panes
set -g focus-events on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Kill pane without confirmation (for Cmd+W in Ghostty)
bind-key x kill-pane

# Split panes preserving current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows also preserve current path
bind c new-window -c "#{pane_current_path}"

# Repeatable pane resizing (no need to press prefix each time)
bind -r Left resize-pane -L 10
bind -r Right resize-pane -R 10
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5

# Utility bindings
bind-key C-j command-prompt -p "move pane to:" "join-pane -t '%%'"
bind-key C-h split-window -v "btop"
bind-key t split-window -v "nvim ~/todo.md"

# FZF file picker popup - inserts selected files as comma-separated list
bind-key m popup -B -E -d "#{pane_current_path}" "tmux send-keys -l \"$(fzf -m --border --layout=reverse-list --style=minimal --bind 'ctrl-d:reload(fd --type d --hidden --follow --exclude \".git\"),ctrl-f:reload(eval \"$FZF_DEFAULT_COMMAND\")' | sed 's/\$/, /' | xargs | sed 's/,\$//')\""

# tmux-sessionizer (tms): replaces OpenSessions
# C-o: fuzzy-find a directory and open it as a session named after the dir
# C-f: fuzzy-switch between active sessions (with preview)
bind C-o display-popup -E "tms"
bind C-f display-popup -E "tms switch"
# Refresh the status bar's session list immediately after switching sessions
bind -r ( switch-client -p -O creation \; refresh-client -S
bind -r ) switch-client -n -O creation \; refresh-client -S

# Click the status-bar session list to switch (ranges drawn by session-list.sh).
# Never `select-window -t=` here — clicks outside a window range segfault the server.
bind -n MouseDown1Status run-shell "~/.config/tmux/session-switch.sh '#{mouse_status_range}'"

# prefix + 1..9: jump to the Nth session (matches the numbered status-bar list)
bind 1 run-shell "~/.config/tmux/session-switch.sh 1"
bind 2 run-shell "~/.config/tmux/session-switch.sh 2"
bind 3 run-shell "~/.config/tmux/session-switch.sh 3"
bind 4 run-shell "~/.config/tmux/session-switch.sh 4"
bind 5 run-shell "~/.config/tmux/session-switch.sh 5"
bind 6 run-shell "~/.config/tmux/session-switch.sh 6"
bind 7 run-shell "~/.config/tmux/session-switch.sh 7"
bind 8 run-shell "~/.config/tmux/session-switch.sh 8"
bind 9 run-shell "~/.config/tmux/session-switch.sh 9"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Use Ctrl-h/j/k/l for vim/tmux pane navigation.
set -g @vim_navigator_mapping_left 'C-h'
set -g @vim_navigator_mapping_down 'C-j'
set -g @vim_navigator_mapping_up 'C-k'
set -g @vim_navigator_mapping_right 'C-l'
set -g @vim_navigator_mapping_prev 'C-\'

# Drop old Alt bindings when re-sourcing an existing tmux server.
unbind-key -n M-h
unbind-key -n M-j
unbind-key -n M-k
unbind-key -n M-l
unbind-key -T copy-mode-vi M-h
unbind-key -T copy-mode-vi M-j
unbind-key -T copy-mode-vi M-k
unbind-key -T copy-mode-vi M-l

# Extend vim-tmux-navigator to also detect Pi/Claude agents for Ctrl passthrough.
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|pi|claude)(diff)?(-wrapped)?'

# Clear options from removed plugins when re-sourcing an existing server.
set -gu @yank_action
set -gu @yank-sticky

set -g @plugin 'tmux-plugins/tmux-resurrect'
# Extra programs to restore manually. Defaults already include vim/nvim/less/top/htop.
set -g @resurrect-processes 'ssh mosh-client lazygit btop'

set -g @plugin 'tmux-plugins/tmux-continuum'
# Auto-restore the last saved session when the server starts.
set -g @continuum-restore 'on'
# Auto-save interval in minutes (default 15).
set -g @continuum-save-interval '15'

# Status bar: nested session/window list (session-list.sh) left, clock right.
set -g status on
set -g status-position bottom
set -g status-interval 30
set -g status-justify left
set -g status-style 'bg=colour235,fg=colour245,overline'

# Flag windows that ring the terminal bell so the session-list script can
# surface them (the only native "needs attention" signal without a hook).
set -g monitor-bell on
set -g monitor-activity off

set -g status-left-length 400
set -g status-left '#(~/.config/tmux/session-list.sh "#S")'

set -g status-right-length 60
set -g status-right '#[fg=yellow]#{?client_prefix,PREFIX ,}#[fg=colour245]%a %d %b #[fg=cyan,bold]%H:%M '

# Blank the native window list — session-list.sh renders windows itself.
set -g window-status-format ''
set -g window-status-current-format ''
set -g window-status-separator ''

# Window names: show directory basename (native format, no subprocess fork)
set -g automatic-rename-format "#{=20:#{b:pane_current_path}}"
set -g automatic-rename on

# PT keyboard friendly rebinds (avoid [ ] { })
bind v copy-mode            # enter copy mode (was [)
unbind p
bind p paste-buffer         # paste (was ])
bind < swap-pane -U         # swap pane up (was {)
bind > swap-pane -D         # swap pane down (was })

# Vi-mode copy bindings: v for visual selection, y for yank to clipboard
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Window switching (prev-window moved to C-p only since p is now paste)
bind C-p previous-window
bind C-n next-window

# Direct window switching with F1 through F5
bind-key -n F1 select-window -t 1
bind-key -n F2 select-window -t 2
bind-key -n F3 select-window -t 3
bind-key -n F4 select-window -t 4
bind-key -n F5 select-window -t 5

run '~/.tmux/plugins/tpm/tpm'

# Toggle sticky yank: prefix + y switches between exit/stay in copy mode after yank
bind y if-shell '[ "$(tmux show -gqv @yank-sticky)" = on ]' {
    set -g @yank-sticky off
    bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
    display-message 'Yank: exit copy mode'
} {
    set -g @yank-sticky on
    bind-key -T copy-mode-vi y send-keys -X copy-selection-no-clear
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
    display-message 'Yank: stay in copy mode'
}
